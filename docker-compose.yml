services:
  fragmint:
    build: .
    ports:
      - "3210:3210"
    volumes:
      - ./example-vault:/data/vault
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      FRAGMINT_STORE_PATH: /data/vault
      FRAGMINT_JWT_SECRET: ${JWT_SECRET:-changeme-in-production}
      FRAGMINT_MILVUS_ENABLED: "true"
      FRAGMINT_MILVUS_ADDRESS: milvus:19530
      FRAGMINT_EMBEDDING_ENDPOINT: http://host.docker.internal:11434
      FRAGMINT_LLM_ENDPOINT: http://host.docker.internal:11434/v1
      FRAGMINT_LLM_MODEL: mistral-nemo:12b
      FRAGMINT_CORS_ORIGIN: http://localhost:3210
    depends_on:
      milvus:
        condition: service_healthy

  # Milvus v2.4 requires etcd (metadata) + minio (storage)
  etcd:
    image: quay.io/coreos/etcd:v3.5.18
    environment:
      ETCD_AUTO_COMPACTION_MODE: revision
      ETCD_AUTO_COMPACTION_RETENTION: "1000"
      ETCD_QUOTA_BACKEND_BYTES: "4294967296"
      ETCD_SNAPSHOT_COUNT: "50000"
    volumes:
      - etcd-data:/etcd
    command: etcd -advertise-client-urls=http://127.0.0.1:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:RELEASE.2023-03-20T20-16-18Z
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    ports:
      - "9001:9001"
    volumes:
      - minio-data:/minio_data
    command: minio server /minio_data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  milvus:
    image: milvusdb/milvus:v2.4.0
    command: ["milvus", "run", "standalone"]
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
    ports:
      - "19530:19530"
      - "9091:9091"
    volumes:
      - milvus-data:/var/lib/milvus
    depends_on:
      etcd:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

volumes:
  etcd-data:
  minio-data:
  milvus-data:
