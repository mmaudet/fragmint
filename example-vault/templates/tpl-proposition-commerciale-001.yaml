id: tpl-proposition-commerciale-001
name: Proposition commerciale souveraineté
description: "Template standard pour propositions commerciales axées souveraineté numérique"
output_format: docx
carbone_template: proposition-commerciale.docx
version: "1.0"

fragments:
  - key: introduction
    type: introduction
    domain: souveraineté
    lang: "{{context.lang}}"
    quality_min: approved
    required: true
    fallback: error
    count: 1

  - key: arguments
    type: argument
    domain: "{{context.product}}"
    lang: "{{context.lang}}"
    quality_min: reviewed
    required: false
    fallback: skip
    count: 3

  - key: conclusion
    type: conclusion
    domain: souveraineté
    lang: "{{context.lang}}"
    quality_min: reviewed
    required: false
    fallback: skip
    count: 1

context_schema:
  lang:
    type: string
    enum: [fr, en]
    required: true
  product:
    type: string
    required: true
  client:
    type: string
    required: false
  date:
    type: date
    default: today
 
 
 
