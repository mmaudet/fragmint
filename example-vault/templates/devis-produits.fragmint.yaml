id: tpl-devis-produits-001
name: Devis produits souverains
description: "Devis avec tableau de lignes produits, quantités et calcul de totaux"
output_format: docx
carbone_template: devis-produits.docx
version: "1.0"

fragments:
  - key: introduction
    type: introduction
    domain: souveraineté
    lang: "{{context.lang}}"
    quality_min: approved
    required: true
    fallback: error
    count: 1

  - key: produits
    type: pricing
    domain: "{{context.product}}"
    lang: "{{context.lang}}"
    quality_min: draft
    required: false
    fallback: skip
    count: 10

context_schema:
  lang:
    type: string
    enum: [fr, en]
    required: true
  client:
    type: string
    required: true
  ref:
    type: string
    required: true
  date:
    type: date
    default: today
 
 
