id: tpl-lincloud-docx
name: "LinCloud Souverain — Proposition commerciale DOCX"
output_format: docx
carbone_template: lincloud-proposal.docx
version: "1.0"
context_schema:
  client:
    type: string
    required: true
  date:
    type: date
    default: today
  reference:
    type: string
    default: "LC-2026-001"
fragments:
  - key: introduction
    type: introduction
    domain: cloud
    lang: fr
    count: 1
  - key: arguments
    type: argument
    domain: cloud
    lang: fr
    count: 6
  - key: pricing
    type: pricing
    domain: cloud
    lang: fr
    count: 1
  - key: references
    type: argument
    domain: cloud
    lang: fr
    count: 1
    fallback: skip
  - key: conclusion
    type: conclusion
    domain: cloud
    lang: fr
    count: 1
